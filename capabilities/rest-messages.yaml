naftiko: 1.0.0-alpha2
info:
  label: Apache RocketMQ REST API — Messages
  description: 'Apache RocketMQ REST API — Messages. 3 operations. Lead operation: Apache RocketMQ Send Message. Self-contained
    Naftiko capability covering one Apache Rocketmq business surface.'
  tags:
  - Apache Rocketmq
  - Messages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_ROCKETMQ_API_KEY: APACHE_ROCKETMQ_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-messages
    baseUri: https://rocketmq.example.com/api/v1
    description: Apache RocketMQ REST API — Messages business capability. Self-contained, no shared references.
    resources:
    - name: messages
      path: /messages
      operations:
      - name: sendmessage
        method: POST
        description: Apache RocketMQ Send Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: messages-ack
      path: /messages/ack
      operations:
      - name: acknowledgemessage
        method: POST
        description: Apache RocketMQ Acknowledge Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: messages-receive
      path: /messages/receive
      operations:
      - name: receivemessages
        method: POST
        description: Apache RocketMQ Receive Messages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: rest-messages-rest
    port: 8080
    description: REST adapter for Apache RocketMQ REST API — Messages. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/messages
      name: messages
      description: REST surface for messages.
      operations:
      - method: POST
        name: sendmessage
        description: Apache RocketMQ Send Message
        call: rest-messages.sendmessage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/messages/ack
      name: messages-ack
      description: REST surface for messages-ack.
      operations:
      - method: POST
        name: acknowledgemessage
        description: Apache RocketMQ Acknowledge Message
        call: rest-messages.acknowledgemessage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/messages/receive
      name: messages-receive
      description: REST surface for messages-receive.
      operations:
      - method: POST
        name: receivemessages
        description: Apache RocketMQ Receive Messages
        call: rest-messages.receivemessages
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-messages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache RocketMQ REST API — Messages. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apache-rocketmq-send-message
      description: Apache RocketMQ Send Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-messages.sendmessage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-rocketmq-acknowledge-message
      description: Apache RocketMQ Acknowledge Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-messages.acknowledgemessage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-rocketmq-receive-messages
      description: Apache RocketMQ Receive Messages
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-messages.receivemessages
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
