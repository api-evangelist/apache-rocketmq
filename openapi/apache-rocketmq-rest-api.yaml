openapi: 3.0.3
info:
  title: Apache RocketMQ REST API
  description: Apache RocketMQ is a cloud-native messaging and streaming platform. This API provides REST endpoints for sending and receiving messages, managing topics and subscriptions, and monitoring brokers and consumer groups.
  version: 5.1.0
  contact:
    name: Apache RocketMQ
    url: https://rocketmq.apache.org/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: https://rocketmq.example.com/api/v1
    description: Apache RocketMQ REST API

paths:
  /topics:
    get:
      operationId: listTopics
      summary: Apache RocketMQ List Topics
      description: List all topics in the RocketMQ cluster.
      tags: [Topics]
      x-microcks-operation:
        dispatcher: RANDOM
      responses:
        '200':
          description: List of topics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicList'
    post:
      operationId: createTopic
      summary: Apache RocketMQ Create Topic
      description: Create a new topic in the RocketMQ cluster.
      tags: [Topics]
      x-microcks-operation:
        dispatcher: RANDOM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopicRequest'
      responses:
        '201':
          description: Topic created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Topic'
  /topics/{topic}:
    get:
      operationId: getTopic
      summary: Apache RocketMQ Get Topic
      description: Retrieve details of a specific RocketMQ topic.
      tags: [Topics]
      x-microcks-operation:
        dispatcher: URI_PARTS
        dispatcherRules: topic
      parameters:
        - name: topic
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Topic details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Topic'
    delete:
      operationId: deleteTopic
      summary: Apache RocketMQ Delete Topic
      description: Delete a topic from the RocketMQ cluster.
      tags: [Topics]
      x-microcks-operation:
        dispatcher: URI_PARTS
        dispatcherRules: topic
      parameters:
        - name: topic
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Topic deleted
  /messages:
    post:
      operationId: sendMessage
      summary: Apache RocketMQ Send Message
      description: Send a message to a RocketMQ topic.
      tags: [Messages]
      x-microcks-operation:
        dispatcher: RANDOM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageRequest'
      responses:
        '200':
          description: Message sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendResult'
  /messages/receive:
    post:
      operationId: receiveMessages
      summary: Apache RocketMQ Receive Messages
      description: Pull messages from a topic for a consumer group.
      tags: [Messages]
      x-microcks-operation:
        dispatcher: RANDOM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceiveRequest'
      responses:
        '200':
          description: Messages received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiveResult'
  /messages/ack:
    post:
      operationId: acknowledgeMessage
      summary: Apache RocketMQ Acknowledge Message
      description: Acknowledge message consumption to commit the offset.
      tags: [Messages]
      x-microcks-operation:
        dispatcher: RANDOM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AckRequest'
      responses:
        '200':
          description: Message acknowledged
  /consumer-groups:
    get:
      operationId: listConsumerGroups
      summary: Apache RocketMQ List Consumer Groups
      description: List all consumer groups in the RocketMQ cluster.
      tags: [ConsumerGroups]
      x-microcks-operation:
        dispatcher: RANDOM
      responses:
        '200':
          description: List of consumer groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumerGroupList'
    post:
      operationId: createConsumerGroup
      summary: Apache RocketMQ Create Consumer Group
      description: Create a new consumer group for subscribing to topics.
      tags: [ConsumerGroups]
      x-microcks-operation:
        dispatcher: RANDOM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsumerGroupRequest'
      responses:
        '201':
          description: Consumer group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumerGroup'
  /brokers:
    get:
      operationId: listBrokers
      summary: Apache RocketMQ List Brokers
      description: List all brokers in the RocketMQ cluster.
      tags: [Brokers]
      x-microcks-operation:
        dispatcher: RANDOM
      responses:
        '200':
          description: List of brokers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrokerList'

components:
  schemas:
    TopicList:
      type: object
      description: List of RocketMQ topics
      properties:
        topics:
          type: array
          items:
            $ref: '#/components/schemas/Topic'
        total:
          type: integer
    Topic:
      type: object
      description: RocketMQ topic
      properties:
        name:
          type: string
          description: Topic name
        clusterName:
          type: string
          description: Cluster name
        queueNum:
          type: integer
          description: Number of message queues
        perm:
          type: integer
          description: Permission flags (2=write, 4=read, 6=read+write)
        topicFilterType:
          type: string
          enum: [SINGLE_TAG, MULTI_TAG]
    TopicRequest:
      type: object
      description: Request to create a RocketMQ topic
      required: [name]
      properties:
        name:
          type: string
          description: Topic name
        clusterName:
          type: string
          description: Target cluster
        queueNum:
          type: integer
          description: Number of queues (default 8)
        perm:
          type: integer
          description: Permission (6 = read+write)
    MessageRequest:
      type: object
      description: Request to send a message to RocketMQ
      required: [topic, body]
      properties:
        topic:
          type: string
          description: Target topic name
        body:
          type: string
          description: Message body content
        tag:
          type: string
          description: Message tag for filtering
        keys:
          type: array
          items:
            type: string
          description: Message keys for lookup
        properties:
          type: object
          additionalProperties:
            type: string
          description: User-defined message properties
        delayLevel:
          type: integer
          description: Delay level for scheduled messages (0=no delay)
    SendResult:
      type: object
      description: Result of sending a message
      properties:
        msgId:
          type: string
          description: Message identifier
        offsetMsgId:
          type: string
          description: Physical offset message ID
        queueOffset:
          type: integer
          format: int64
          description: Queue offset of the message
        queueId:
          type: integer
          description: Queue ID the message was sent to
        sendStatus:
          type: string
          enum: [SEND_OK, FLUSH_DISK_TIMEOUT, FLUSH_SLAVE_TIMEOUT, SLAVE_NOT_AVAILABLE]
    ReceiveRequest:
      type: object
      description: Request to receive messages from a topic
      required: [topic, consumerGroup]
      properties:
        topic:
          type: string
          description: Topic to consume from
        consumerGroup:
          type: string
          description: Consumer group identifier
        maxMessages:
          type: integer
          description: Maximum messages to pull
        invisibleDuration:
          type: integer
          description: Invisible duration in milliseconds
    ReceiveResult:
      type: object
      description: Result of receiving messages
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
    Message:
      type: object
      description: Received RocketMQ message
      properties:
        msgId:
          type: string
          description: Message identifier
        topic:
          type: string
          description: Topic name
        body:
          type: string
          description: Message body
        tag:
          type: string
          description: Message tag
        keys:
          type: array
          items:
            type: string
        properties:
          type: object
          additionalProperties:
            type: string
        bornTimestamp:
          type: integer
          format: int64
          description: Message creation timestamp in milliseconds
        receiptHandle:
          type: string
          description: Handle for acknowledging the message
    AckRequest:
      type: object
      description: Request to acknowledge a message
      required: [receiptHandle, topic, consumerGroup]
      properties:
        receiptHandle:
          type: string
          description: Receipt handle from receive response
        topic:
          type: string
          description: Topic name
        consumerGroup:
          type: string
          description: Consumer group
    ConsumerGroupList:
      type: object
      description: List of consumer groups
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/ConsumerGroup'
        total:
          type: integer
    ConsumerGroup:
      type: object
      description: RocketMQ consumer group
      properties:
        name:
          type: string
          description: Consumer group name
        consumeFromWhere:
          type: string
          enum: [CONSUME_FROM_LAST_OFFSET, CONSUME_FROM_FIRST_OFFSET, CONSUME_FROM_TIMESTAMP]
        consumeType:
          type: string
          enum: [CONSUME_ACTIVELY, CONSUME_PASSIVELY]
        messageModel:
          type: string
          enum: [BROADCASTING, CLUSTERING]
    ConsumerGroupRequest:
      type: object
      description: Request to create a consumer group
      required: [name]
      properties:
        name:
          type: string
          description: Consumer group name
        consumeFromWhere:
          type: string
          enum: [CONSUME_FROM_LAST_OFFSET, CONSUME_FROM_FIRST_OFFSET]
        messageModel:
          type: string
          enum: [BROADCASTING, CLUSTERING]
    BrokerList:
      type: object
      description: List of RocketMQ brokers
      properties:
        brokers:
          type: array
          items:
            $ref: '#/components/schemas/Broker'
    Broker:
      type: object
      description: RocketMQ broker
      properties:
        brokerName:
          type: string
          description: Broker name
        clusterId:
          type: string
          description: Cluster identifier
        brokerId:
          type: integer
          description: Broker ID (0=master, >0=slave)
        brokerAddr:
          type: string
          description: Broker address (host:port)
        version:
          type: string
          description: Broker version
